<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커리어 기회 탐색기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 0; }
    .container { max-width: 720px; margin: 60px auto; padding: 0 20px; }
    h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #64748b; margin-bottom: 36px; }

    /* 탭 */
    .tabs { display: flex; border-bottom: 2px solid #e2e8f0; margin-bottom: 24px; }
    .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer;
               font-size: 0.95rem; color: #64748b; border-bottom: 3px solid transparent;
               margin-bottom: -2px; transition: all .15s; }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }
    .tab-btn:hover:not(.active) { color: #334155; }

    /* 탭 패널 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    textarea { width: 100%; min-height: 280px; padding: 14px; border: 1px solid #cbd5e1;
               border-radius: 8px; font-size: 0.95rem; resize: vertical; line-height: 1.6; }
    textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px #bfdbfe; }

    .upload-area { border: 2px dashed #cbd5e1; border-radius: 8px; padding: 48px 24px;
                   text-align: center; cursor: pointer; transition: all .15s; }
    .upload-area:hover, .upload-area.drag { border-color: #2563eb; background: #eff6ff; }
    .upload-area input { display: none; }
    .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .upload-label { color: #2563eb; font-weight: 600; cursor: pointer; }
    .file-name { margin-top: 12px; font-size: 0.9rem; color: #475569; }

    .btn { width: 100%; padding: 14px; background: #2563eb; color: #fff; border: none;
           border-radius: 8px; font-size: 1.05rem; font-weight: 600; cursor: pointer;
           margin-top: 20px; transition: background .15s; }
    .btn:hover { background: #1d4ed8; }

    .error { background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
             border-radius: 8px; padding: 14px; margin-bottom: 20px; }
    .hint { font-size: 0.85rem; color: #94a3b8; margin-top: 10px; }
    .nav-link { text-align: right; margin-bottom: 16px; }
    .nav-link a { color: #2563eb; font-size: 0.9rem; text-decoration: none; }
    .nav-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-link"><a href="{% url 'opportunities:list' %}">전체 공고 보기 →</a></div>

    <h1>커리어 기회 탐색기</h1>
    <p class="subtitle">이력서를 입력하면 딱 맞는 기회 5가지를 추천해드립니다.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('text', this)">✏️ 텍스트 입력</button>
      <button class="tab-btn" onclick="switchTab('pdf', this)">📄 PDF 업로드</button>
    </div>

    <!-- 텍스트 입력 탭 -->
    <form method="post" enctype="multipart/form-data" id="form-text">
      {% csrf_token %}
      <div class="tab-panel active" id="panel-text">
        <textarea name="resume_text" placeholder="이력서 내용을 붙여넣어 주세요.&#10;&#10;예)&#10;- Python, Django, FastAPI 3년&#10;- 머신러닝, TensorFlow 경험&#10;- 데이터 파이프라인 구축 (Airflow, Spark)">{{ request.POST.resume_text }}</textarea>
        <p class="hint">기술 스택, 경력 사항, 프로젝트 등을 자유롭게 입력하세요.</p>
        <button type="submit" class="btn">추천 받기</button>
      </div>
    </form>

    <!-- PDF 업로드 탭 -->
    <form method="post" enctype="multipart/form-data" id="form-pdf">
      {% csrf_token %}
      <div class="tab-panel" id="panel-pdf">
        <div class="upload-area" id="drop-zone" onclick="document.getElementById('pdf-input').click()"
             ondragover="event.preventDefault(); this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="handleDrop(event)">
          <div class="upload-icon">📄</div>
          <div>PDF 파일을 <span class="upload-label">선택</span>하거나 여기에 끌어다 놓으세요</div>
          <input type="file" id="pdf-input" name="resume_pdf" accept=".pdf"
                 onchange="showFileName(this)">
          <div class="file-name" id="file-name">최대 10MB</div>
        </div>
        <p class="hint">텍스트가 포함된 PDF만 지원합니다. 이미지 스캔 파일은 인식되지 않을 수 있습니다.</p>
        <button type="submit" class="btn">추천 받기</button>
      </div>
    </form>
  </div>

  <script>
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + name).classList.add('active');
    }
    function showFileName(input) {
      const name = input.files[0]?.name || '최대 10MB';
      document.getElementById('file-name').textContent = name;
    }
    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('drop-zone').classList.remove('drag');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('pdf-input').files = dt.files;
        showFileName(document.getElementById('pdf-input'));
      }
    }
    // 이전 에러 시 어떤 탭이었는지 복원
    {% if request.FILES.resume_pdf %}
    switchTab('pdf', document.querySelectorAll('.tab-btn')[1]);
    {% endif %}
  </script>
</body>
</html>
